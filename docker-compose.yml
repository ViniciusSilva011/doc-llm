services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: doc_llm
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doc_llm"]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      target: worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/doc_llm
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /app/data/uploads
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - storage_data:/app/data/uploads
    command: ["npm", "run", "worker:dev"]

  dev:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/doc_llm
      TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/doc_llm_test
      PORT: ${DEV_APP_PORT:-3100}
      NEXTAUTH_URL: http://localhost:${DEV_APP_PORT:-3100}
      APP_URL: http://localhost:${DEV_APP_PORT:-3100}
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /app/data/uploads
    ports:
      - "${DEV_APP_PORT:-3100}:${DEV_APP_PORT:-3100}"
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - next_cache:/app/.next
      - storage_data:/app/data/uploads
    command:
      ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "${DEV_APP_PORT:-3100}"]

  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        APP_URL: http://localhost:${PROD_APP_PORT:-3000}
        DATABASE_URL: postgres://postgres:postgres@db:5432/doc_llm
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_URL: http://localhost:${PROD_APP_PORT:-3000}
        OPENAI_API_KEY: ${OPENAI_API_KEY}
        OPENAI_GENERATION_MODEL: ${OPENAI_GENERATION_MODEL}
        EMBEDDING_MODEL: ${EMBEDDING_MODEL}
        EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION}
        DEMO_USER_EMAIL: ${DEMO_USER_EMAIL}
        DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD}
        STORAGE_BACKEND: local
        STORAGE_LOCAL_DIR: /app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/doc_llm
      PORT: ${PROD_APP_PORT:-3000}
      NEXTAUTH_URL: http://localhost:${PROD_APP_PORT:-3000}
      APP_URL: http://localhost:${PROD_APP_PORT:-3000}
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /app/data/uploads
    ports:
      - "${PROD_APP_PORT:-3000}:${PROD_APP_PORT:-3000}"
    volumes:
      - storage_data:/app/data/uploads
    command: ["node", "server.js"]

volumes:
  next_cache:
  postgres_data:
  storage_data:
  web_node_modules:
